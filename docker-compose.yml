# Runs PosgreSQL only. The app runs locally with

services:
  postgres:
    image: postgres:16-alpine
    container_name: saldapp-db
    restart: unless-stopped

    environment:
      POSTGRES_DB: saldapp
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}

    ports:
      - "5435:5432"

    volumes:
        - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d saldapp"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
    postgres_data:
      name: saldapp_postgres_data